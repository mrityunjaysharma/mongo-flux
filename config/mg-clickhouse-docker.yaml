# mg-clickhouse configuration for Docker Compose
# MongoDB Replica Set: 1 Primary + 2 Secondaries
mongo:
  uri: "mongodb://mongo-primary:27017,mongo-secondary1:27017,mongo-secondary2:27017/?replicaSet=rs0"
  database: "myapp"

clickhouse:
  host: "clickhouse"
  port: 8123
  database: "analytics"
  user: "default"
  password: ""

sync:
  mode: "oplog"
  batch_size: 1000
  flush_interval_ms: 500
  resume_token_path: "/var/lib/mg-clickhouse/resume_tokens"
  max_pending_rows: 100000
  propagate_deletes: false

api:
  port: 9090
  bind: "0.0.0.0"

routing:
  clickhouse_param: "clickhouse"

logging:
  level: "info"
  file: ""
