# mg-clickhouse configuration
mongo:
  uri: "mongodb://localhost:27017"
  database: "myapp"

clickhouse:
  host: "localhost"
  port: 8123
  database: "analytics"
  user: "default"
  password: ""

sync:
  mode: "oplog"  # "oplog" = direct oplog tailing (like a secondary), "changestream" = change streams API
  batch_size: 1000
  flush_interval_ms: 500
  resume_token_path: "/var/lib/mg-clickhouse/resume_tokens"

api:
  port: 9090
  bind: "0.0.0.0"

routing:
  # URI parameter name that triggers ClickHouse reads
  clickhouse_param: "clickhouse"

logging:
  level: "info"  # debug, info, warn, error
  file: "/var/log/mg-clickhouse/mg-clickhouse.log"
