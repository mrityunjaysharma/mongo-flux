services:
  # MongoDB Replica Set: 1 Primary + 2 Secondaries
  mongo-primary:
    image: mongo:7
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_primary_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo-secondary1:
    image: mongo:7
    ports:
      - "27018:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_secondary1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      mongo-primary:
        condition: service_healthy

  mongo-secondary2:
    image: mongo:7
    ports:
      - "27019:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_secondary2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      mongo-primary:
        condition: service_healthy

  # Initialize replica set with all 3 members
  mongo-init-replica:
    image: mongo:7
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary1:
        condition: service_healthy
      mongo-secondary2:
        condition: service_healthy
    entrypoint: >
      bash -c "
        mongosh --host mongo-primary:27017 --eval '
          rs.initiate({
            _id: \"rs0\",
            members: [
              {_id: 0, host: \"mongo-primary:27017\", priority: 2},
              {_id: 1, host: \"mongo-secondary1:27017\", priority: 1},
              {_id: 2, host: \"mongo-secondary2:27017\", priority: 1}
            ]
          })
        ' || true;
        sleep 5;
        mongosh --host mongo-primary:27017 --eval 'rs.status().members.forEach(m => print(m.name, m.stateStr))';
      "

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # MongoFlux (tails oplog from primary)
  mongoflux:
    build: .
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary1:
        condition: service_healthy
      mongo-secondary2:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
    ports:
      - "9090:9090"
      - "27020:27020"
    environment:
      MG_MONGO_URI: "mongodb://mongo-primary:27017,mongo-secondary1:27017,mongo-secondary2:27017/?replicaSet=rs0"
      MG_MONGO_DB: "myapp"
      MG_CH_HOST: "clickhouse"
      MG_CH_PORT: "8123"
      MG_CH_DB: "myapp"
      MG_CH_USER: "default"
      MG_SYNC_MODE: "oplog"
      MG_SYNC_RESUME_TOKEN_PATH: "/var/lib/mongoflux/resume_tokens"
      MG_API_PORT: "9090"
      MG_LOG_LEVEL: "info"
    volumes:
      - mongoflux_data:/var/lib/mongoflux
    restart: on-failure

volumes:
  mongo_primary_data:
  mongo_secondary1_data:
  mongo_secondary2_data:
  ch_data:
  mongoflux_data:
