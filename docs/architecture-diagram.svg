<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" font-family="'Inter', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="glowGreen">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#10b981" flood-opacity="0.2"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrAmber" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1500" height="1000" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="750" y="38" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a" letter-spacing="-0.5">MongoFlux</text>
  <text x="750" y="60" text-anchor="middle" font-size="13" fill="#64748b">MongoDB to ClickHouse sync with zero-overhead query routing</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Your Application -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(580, 85)">
    <rect x="0" y="0" width="280" height="54" rx="27" fill="#0f172a" filter="url(#cardShadow)"/>
    <text x="140" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Your Application</text>
  </g>

  <!-- Arrow: App → writes (down-left to MongoDB) -->
  <path d="M 660 139 L 660 168 Q 660 180 647 180 L 340 180 Q 327 180 327 193 L 327 215" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <rect x="440" y="168" width="52" height="18" rx="9" fill="#fef2f2"/>
  <text x="466" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">writes</text>

  <!-- Arrow: App → reads (down-right to MongoFlux) -->
  <path d="M 780 139 L 780 168 Q 780 180 793 180 L 1060 180 Q 1073 180 1073 193 L 1073 215" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <rect x="890" y="168" width="48" height="18" rx="9" fill="#eff6ff"/>
  <text x="914" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">reads</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT: MongoDB Replica Set (big box) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(80, 225)">
    <rect x="0" y="0" width="500" height="380" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="28" y="32" font-size="12" font-weight="700" fill="#374151" letter-spacing="0.5">MONGODB REPLICA SET</text>

    <!-- Primary -->
    <g transform="translate(150, 55)">
      <rect x="0" y="0" width="200" height="80" rx="10" fill="#f8fafc" stroke="#d1d5db" stroke-width="1.2"/>
      <circle cx="24" cy="26" r="8" fill="#16a34a"/>
      <text x="42" y="24" font-size="10" fill="#64748b">MongoDB</text>
      <text x="42" y="44" font-size="15" font-weight="700" fill="#0f172a">Primary</text>
      <text x="18" y="66" font-size="10" fill="#94a3b8">insert · update · delete</text>
    </g>

    <!-- Dotted line: Primary → Secondary 1 -->
    <path d="M 210 135 L 140 175" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>

    <!-- Dotted line: Primary → Secondary 2 -->
    <path d="M 290 135 L 360 175" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>

    <!-- Replication label -->
    <text x="250" y="160" text-anchor="middle" font-size="9" fill="#94a3b8">replication</text>

    <!-- Secondary 1 -->
    <g transform="translate(50, 185)">
      <rect x="0" y="0" width="160" height="56" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="20" cy="20" r="5" fill="#6366f1"/>
      <text x="34" y="22" font-size="9" fill="#64748b">Secondary</text>
      <text x="34" y="40" font-size="12" font-weight="600" fill="#0f172a">Node 1</text>
    </g>

    <!-- Secondary 2 -->
    <g transform="translate(290, 185)">
      <rect x="0" y="0" width="160" height="56" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
      <circle cx="20" cy="20" r="5" fill="#6366f1"/>
      <text x="34" y="22" font-size="9" fill="#64748b">Secondary</text>
      <text x="34" y="40" font-size="12" font-weight="600" fill="#0f172a">Node 2</text>
    </g>

    <!-- Oplog label near primary -->
    <rect x="360" y="80" width="70" height="20" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="395" y="94" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">oplog.rs</text>

    <!-- Reads forwarded note -->
    <g transform="translate(50, 280)">
      <rect x="0" y="0" width="400" height="50" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
      <text x="200" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#4338ca">Reads without ?clickhouse=true</text>
      <text x="200" y="38" text-anchor="middle" font-size="10" fill="#64748b">forwarded here unchanged → 0% overhead</text>
    </g>

    <!-- Dotted lines from secondaries to the "reads forwarded" box -->
    <path d="M 130 241 L 130 280" stroke="#a5b4fc" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 370 241 L 370 280" stroke="#a5b4fc" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT: MongoFlux Engine -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(660, 225)">
    <rect x="0" y="0" width="780" height="530" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="780" height="46" rx="16" fill="#0f172a"/>
    <rect x="0" y="30" width="780" height="16" fill="#0f172a"/>
    <text x="390" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1">MONGOFLUX ENGINE</text>

    <!-- ═══════════════════════════════════════ -->
    <!-- READ PATH label -->
    <!-- ═══════════════════════════════════════ -->
    <text x="24" y="72" font-size="10" font-weight="700" fill="#2563eb" letter-spacing="1">READ PATH</text>
    <line x1="100" y1="68" x2="756" y2="68" stroke="#e2e8f0" stroke-width="1"/>

    <!-- ─── Step 1: Query Router ─── -->
    <g transform="translate(24, 82)">
      <rect x="0" y="0" width="732" height="100" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2"/>
      <rect x="0" y="0" width="4" height="100" rx="2" fill="#8b5cf6"/>
      <text x="20" y="20" font-size="9" font-weight="700" fill="#7c3aed" letter-spacing="0.8">01  QUERY ROUTER</text>
      <text x="20" y="42" font-size="13" font-weight="700" fill="#1e1b4b">Route by URI parameter (first decision point)</text>

      <!-- Two paths -->
      <g transform="translate(20, 54)">
        <rect x="0" y="0" width="340" height="34" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.2"/>
        <text x="170" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">?clickhouse=true</text>
        <text x="170" y="28" text-anchor="middle" font-size="9" fill="#065f46">→ continue to Schema + Translator → ClickHouse</text>
      </g>
      <g transform="translate(380, 54)">
        <rect x="0" y="0" width="340" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
        <text x="170" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">no ?clickhouse param</text>
        <text x="170" y="28" text-anchor="middle" font-size="9" fill="#3730a3">→ forward unchanged to MongoDB Secondary (exit)</text>
      </g>
    </g>

    <!-- Arrow: Step 1 → Step 2 -->
    <path d="M 200 182 L 200 198" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>
    <text x="215" y="194" font-size="8" fill="#10b981" font-weight="600">CH path</text>

    <!-- ─── Step 2: Schema Registry ─── -->
    <g transform="translate(24, 198)">
      <rect x="0" y="0" width="355" height="80" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
      <rect x="0" y="0" width="4" height="80" rx="2" fill="#f59e0b"/>
      <text x="20" y="20" font-size="9" font-weight="700" fill="#d97706" letter-spacing="0.8">02  SCHEMA REGISTRY</text>
      <text x="20" y="42" font-size="13" font-weight="700" fill="#451a03">Field mapping + type resolution</text>
      <text x="20" y="60" font-size="11" fill="#64748b">mongo_field → ch_column</text>
      <text x="20" y="74" font-size="11" fill="#64748b">CollectionMapping → ClickHouse DDL</text>
    </g>

    <!-- Arrow: Step 2 → Step 3 -->
    <line x1="385" y1="238" x2="410" y2="238" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

    <!-- ─── Step 3: Translator ─── -->
    <g transform="translate(420, 198)">
      <rect x="0" y="0" width="336" height="80" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
      <rect x="0" y="0" width="4" height="80" rx="2" fill="#2563eb"/>
      <text x="20" y="20" font-size="9" font-weight="700" fill="#2563eb" letter-spacing="0.8">03  QUERY TRANSLATOR</text>
      <text x="20" y="42" font-size="13" font-weight="700" fill="#172554">BSON → AST → SQL</text>
      <text x="20" y="60" font-size="11" fill="#64748b">12 pipeline stages · 12 accumulators</text>
      <text x="20" y="74" font-size="11" fill="#64748b">40+ expressions (arithmetic, date, string)</text>
    </g>

    <!-- ═══════════════════════════════════════ -->
    <!-- Separator -->
    <!-- ═══════════════════════════════════════ -->
    <line x1="24" y1="300" x2="756" y2="300" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="8,4"/>

    <!-- ═══════════════════════════════════════ -->
    <!-- WRITE PATH label -->
    <!-- ═══════════════════════════════════════ -->
    <text x="24" y="322" font-size="10" font-weight="700" fill="#d97706" letter-spacing="1">WRITE PATH (ASYNC)</text>
    <line x1="180" y1="318" x2="756" y2="318" stroke="#e2e8f0" stroke-width="1"/>

    <!-- ─── Oplog Sync ─── -->
    <g transform="translate(24, 335)">
      <rect x="0" y="0" width="732" height="115" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>

      <rect x="668" y="8" width="50" height="18" rx="9" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="693" y="20" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">ZOOM</text>

      <text x="20" y="22" font-size="9" font-weight="700" fill="#92400e" letter-spacing="0.8">OPLOG SYNC ENGINE</text>
      <text x="180" y="22" font-size="10" fill="#78350f">async · at-least-once · ReplacingMergeTree dedup</text>

      <!-- Pipeline pills -->
      <g transform="translate(20, 40)">
        <rect x="0" y="0" width="88" height="28" rx="14" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.2"/>
        <text x="44" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">tail cursor</text>

        <line x1="94" y1="14" x2="116" y2="14" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

        <rect x="122" y="0" width="100" height="28" rx="14" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.2"/>
        <text x="172" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">extract fields</text>

        <line x1="228" y1="14" x2="250" y2="14" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

        <rect x="256" y="0" width="88" height="28" rx="14" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.2"/>
        <text x="300" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">batch 1000</text>

        <line x1="350" y1="14" x2="372" y2="14" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

        <rect x="378" y="0" width="88" height="28" rx="14" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.2"/>
        <text x="422" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">flush 500ms</text>

        <line x1="472" y1="14" x2="494" y2="14" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrGreen)"/>

        <rect x="500" y="0" width="100" height="28" rx="14" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
        <text x="550" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">INSERT → CH</text>

        <line x1="606" y1="14" x2="628" y2="14" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrGreen)"/>

        <rect x="634" y="0" width="80" height="28" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
        <text x="674" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">save pos</text>
      </g>

      <text x="20" y="92" font-size="10" fill="#94a3b8">crash → resume from saved timestamp · backpressure via max_pending_rows</text>
    </g>

    <!-- ─── Output boxes ─── -->
    <g transform="translate(24, 468)">
      <rect x="0" y="0" width="355" height="44" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
      <text x="177" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">OUTPUT → ClickHouse</text>
      <text x="177" y="35" text-anchor="middle" font-size="10" fill="#6b7280">analytics queries (27x faster)</text>
    </g>
    <g transform="translate(400, 468)">
      <rect x="0" y="0" width="355" height="44" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
      <text x="177" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">OUTPUT → MongoDB Secondary</text>
      <text x="177" y="35" text-anchor="middle" font-size="10" fill="#6b7280">point lookups forwarded unchanged (0% overhead)</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS BETWEEN BOXES (no intersection) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Oplog tail: MongoDB Primary → MongoFlux Write Path -->
  <!-- Goes below both boxes, enters engine from the left side of the oplog sync section -->
  <path d="M 480 605 L 480 680 L 680 680" stroke="#d97706" stroke-width="2.5" stroke-dasharray="7,5" fill="none" marker-end="url(#arrAmber)"/>
  <rect x="540" y="668" width="72" height="20" rx="5" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="576" y="682" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">oplog tail</text>

  <!-- Forward to Secondary: MongoFlux Router → MongoDB Secondary -->
  <!-- Short horizontal arrow between boxes at y=340 -->
  <path d="M 660 340 L 580 340" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#arrIndigo)"/>
  <rect x="593" y="328" width="55" height="18" rx="5" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="620" y="341" text-anchor="middle" font-size="9" font-weight="600" fill="#4338ca">forward</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM: ClickHouse destination -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrow: Engine → ClickHouse -->
  <path d="M 1050 755 L 1050 800" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrGreen)"/>
  <text x="1070" y="785" font-size="9" font-weight="600" fill="#059669">SQL</text>

  <!-- ClickHouse card -->
  <g transform="translate(930, 810)">
    <rect x="0" y="0" width="240" height="110" rx="14" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2.5" filter="url(#glowGreen)"/>
    <text x="120" y="28" text-anchor="middle" font-size="11" fill="#065f46" font-weight="500">Columnar Analytics</text>
    <text x="120" y="52" text-anchor="middle" font-size="18" font-weight="800" fill="#065f46">ClickHouse</text>
    <text x="120" y="82" text-anchor="middle" font-size="28" font-weight="800" fill="#059669">27x</text>
    <text x="120" y="100" text-anchor="middle" font-size="11" fill="#6b7280">faster aggregations</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Metrics bar -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(150, 945)">
    <rect x="0" y="0" width="1200" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="120" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">27x avg speedup</text>
    <line x1="250" y1="8" x2="250" y2="32" stroke="#e2e8f0" stroke-width="1"/>
    <text x="370" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">53x peak</text>
    <line x1="470" y1="8" x2="470" y2="32" stroke="#e2e8f0" stroke-width="1"/>
    <text x="590" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">&lt;1s replication lag</text>
    <line x1="730" y1="8" x2="730" y2="32" stroke="#e2e8f0" stroke-width="1"/>
    <text x="860" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">0% write overhead</text>
    <line x1="1000" y1="8" x2="1000" y2="32" stroke="#e2e8f0" stroke-width="1"/>
    <text x="1100" y="25" text-anchor="middle" font-size="11" fill="#94a3b8">at-least-once delivery</text>
  </g>
</svg>