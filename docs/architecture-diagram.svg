<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="chGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="mongoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="700" x2="1200" y2="700" stroke="#000" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="800" stroke="#000" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="800" stroke="#000" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke="#000" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="800" stroke="#000" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="800" stroke="#000" stroke-width="1"/>
  </g>

  <!-- Title area -->
  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a" letter-spacing="-0.5">MongoFlux</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#64748b" letter-spacing="0.3">Real-time MongoDB → ClickHouse CDC with transparent query routing</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- YOUR APP (top center) -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(470, 90)">
    <rect x="0" y="0" width="260" height="56" rx="28" fill="#0f172a" filter="url(#cardShadow)"/>
    <text x="130" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Your Application</text>
  </g>

  <!-- Arrows from app down -->
  <!-- Writes arrow (left) -->
  <path d="M 540 146 L 540 180 Q 540 195 525 195 L 260 195 Q 245 195 245 210 L 245 240" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="370" y="188" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">writes</text>

  <!-- Reads arrow (right) -->
  <path d="M 660 146 L 660 180 Q 660 195 675 195 L 820 195 Q 835 195 835 210 L 835 240" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="750" y="188" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">reads</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT COLUMN: Write Path -->
  <!-- ═══════════════════════════════════════ -->

  <!-- MongoDB Primary -->
  <g transform="translate(140, 250)">
    <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    <circle cx="30" cy="30" r="14" fill="#16a34a" opacity="0.12"/>
    <circle cx="30" cy="30" r="6" fill="#16a34a"/>
    <text x="52" y="28" font-size="11" fill="#64748b" font-weight="500">MongoDB</text>
    <text x="52" y="48" font-size="16" font-weight="700" fill="#0f172a">Primary</text>
    <text x="20" y="74" font-size="11" fill="#94a3b8">insert · update · delete</text>
  </g>

  <!-- Arrow: Primary → Secondaries -->
  <path d="M 245 340 L 245 380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="265" y="365" font-size="10" fill="#94a3b8">replication</text>

  <!-- Secondaries -->
  <g transform="translate(120, 390)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="55" y="22" text-anchor="middle" font-size="10" fill="#64748b">Secondary</text>
    <text x="55" y="38" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Node 1</text>
  </g>
  <g transform="translate(240, 390)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="55" y="22" text-anchor="middle" font-size="10" fill="#64748b">Secondary</text>
    <text x="55" y="38" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Node 2</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- CENTER: MongoFlux Engine -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Main engine card -->
  <g transform="translate(560, 250)">
    <rect x="0" y="0" width="340" height="320" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#cardShadow)"/>
    
    <!-- Header stripe -->
    <rect x="0" y="0" width="340" height="52" rx="16" fill="#0f172a"/>
    <rect x="0" y="36" width="340" height="16" fill="#0f172a"/>
    <text x="170" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="0.5">MONGOFLUX ENGINE</text>

    <!-- Stage 1 -->
    <g transform="translate(24, 68)">
      <rect x="0" y="0" width="292" height="62" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2"/>
      <rect x="0" y="0" width="4" height="62" rx="2" fill="#8b5cf6"/>
      <text x="20" y="22" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="1">01</text>
      <text x="46" y="22" font-size="13" font-weight="700" fill="#1e1b4b">Query Router</text>
      <text x="20" y="44" font-size="11" fill="#64748b">?clickhouse=true → ClickHouse</text>
      <text x="20" y="56" font-size="11" fill="#64748b">otherwise → MongoDB secondary</text>
    </g>

    <!-- Stage 2 -->
    <g transform="translate(24, 146)">
      <rect x="0" y="0" width="292" height="62" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
      <rect x="0" y="0" width="4" height="62" rx="2" fill="#f59e0b"/>
      <text x="20" y="22" font-size="10" font-weight="700" fill="#d97706" letter-spacing="1">02</text>
      <text x="46" y="22" font-size="13" font-weight="700" fill="#451a03">Schema Registry</text>
      <text x="20" y="44" font-size="11" fill="#64748b">Mongo field → CH column mapping</text>
      <text x="20" y="56" font-size="11" fill="#64748b">type coercion + validation</text>
    </g>

    <!-- Stage 3 -->
    <g transform="translate(24, 224)">
      <rect x="0" y="0" width="292" height="62" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
      <rect x="0" y="0" width="4" height="62" rx="2" fill="#2563eb"/>
      <text x="20" y="22" font-size="10" font-weight="700" fill="#2563eb" letter-spacing="1">03</text>
      <text x="46" y="22" font-size="13" font-weight="700" fill="#172554">Query Translator</text>
      <text x="20" y="44" font-size="11" fill="#64748b">BSON → ExprNode AST → SQL</text>
      <text x="20" y="56" font-size="11" fill="#64748b">12 stages · 12 accumulators · 40+ exprs</text>
    </g>

    <!-- Connecting dots between stages -->
    <circle cx="170" cy="134" r="3" fill="#d1d5db"/>
    <circle cx="170" cy="140" r="2" fill="#e5e7eb"/>
    <circle cx="170" cy="212" r="3" fill="#d1d5db"/>
    <circle cx="170" cy="218" r="2" fill="#e5e7eb"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT: Output Destinations -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Arrow: Engine → ClickHouse -->
  <path d="M 900 360 Q 940 360 960 320 Q 980 280 1020 280" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrGreen)"/>

  <!-- Arrow: Engine → MongoDB Secondary -->
  <path d="M 900 460 Q 940 460 960 500 Q 980 540 1020 540" stroke="#6366f1" stroke-width="2.5" fill="none" marker-end="url(#arrIndigo)"/>

  <!-- ClickHouse destination -->
  <g transform="translate(1030, 230)">
    <rect x="0" y="0" width="150" height="100" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="150" height="100" rx="12" fill="none" stroke="#10b981" stroke-width="0.5" filter="url(#glow)"/>
    <text x="75" y="30" text-anchor="middle" font-size="11" fill="#065f46" font-weight="500">Analytics</text>
    <text x="75" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#065f46">ClickHouse</text>
    <text x="75" y="76" text-anchor="middle" font-size="22" font-weight="800" fill="#059669">27x</text>
    <text x="75" y="92" text-anchor="middle" font-size="10" fill="#6b7280">faster reads</text>
  </g>

  <!-- MongoDB Secondary destination -->
  <g transform="translate(1030, 490)">
    <rect x="0" y="0" width="150" height="100" rx="12" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="75" y="30" text-anchor="middle" font-size="11" fill="#3730a3" font-weight="500">OLTP</text>
    <text x="75" y="52" text-anchor="middle" font-size="16" font-weight="800" fill="#312e81">Secondary</text>
    <text x="75" y="76" text-anchor="middle" font-size="22" font-weight="800" fill="#4f46e5">0%</text>
    <text x="75" y="92" text-anchor="middle" font-size="10" fill="#6b7280">overhead</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- BOTTOM: Async Sync Pipeline -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Dashed arrow from Primary to Sync pipeline -->
  <path d="M 300 340 Q 300 500 350 520 Q 400 540 430 620" stroke="#d97706" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrAmber)"/>
  <text x="320" y="530" font-size="10" font-weight="600" fill="#d97706" transform="rotate(-50, 320, 530)">oplog tail</text>

  <!-- Sync pipeline bar -->
  <g transform="translate(100, 640)">
    <rect x="0" y="0" width="1000" height="70" rx="12" fill="#ffffff" stroke="#fde68a" stroke-width="1.5" filter="url(#cardShadow)"/>
    
    <!-- Left accent -->
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#f59e0b"/>

    <text x="28" y="24" font-size="12" font-weight="700" fill="#92400e">Oplog Sync</text>
    <text x="130" y="24" font-size="11" fill="#78350f">— async, at-least-once, ReplacingMergeTree dedup</text>

    <!-- Pipeline steps as connected pills -->
    <g transform="translate(28, 36)">
      <rect x="0" y="0" width="100" height="26" rx="13" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="50" y="17" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">tail cursor</text>

      <line x1="106" y1="13" x2="130" y2="13" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

      <rect x="136" y="0" width="120" height="26" rx="13" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="196" y="17" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">extract fields</text>

      <line x1="262" y1="13" x2="286" y2="13" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

      <rect x="292" y="0" width="130" height="26" rx="13" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="357" y="17" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">batch (1000)</text>

      <line x1="428" y1="13" x2="452" y2="13" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

      <rect x="458" y="0" width="130" height="26" rx="13" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
      <text x="523" y="17" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">flush 500ms</text>

      <line x1="594" y1="13" x2="618" y2="13" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrAmber)"/>

      <rect x="624" y="0" width="140" height="26" rx="13" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
      <text x="694" y="17" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">INSERT → CH</text>

      <line x1="770" y1="13" x2="794" y2="13" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrGreen)"/>

      <rect x="800" y="0" width="140" height="26" rx="13" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
      <text x="870" y="17" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">save position</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- Metrics strip at very bottom -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(250, 740)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="70" y="18" text-anchor="middle" font-size="14" font-weight="800" fill="#059669">27x</text>
    <text x="70" y="33" text-anchor="middle" font-size="9" fill="#6b7280">avg read speedup</text>

    <rect x="160" y="0" width="140" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="230" y="18" text-anchor="middle" font-size="14" font-weight="800" fill="#059669">53x</text>
    <text x="230" y="33" text-anchor="middle" font-size="9" fill="#6b7280">peak speedup</text>

    <rect x="320" y="0" width="140" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="390" y="18" text-anchor="middle" font-size="14" font-weight="800" fill="#059669">&lt;1s</text>
    <text x="390" y="33" text-anchor="middle" font-size="9" fill="#6b7280">replication lag</text>

    <rect x="480" y="0" width="140" height="40" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="550" y="18" text-anchor="middle" font-size="14" font-weight="800" fill="#4f46e5">0%</text>
    <text x="550" y="33" text-anchor="middle" font-size="9" fill="#6b7280">write overhead</text>
  </g>

  <!-- Source reference -->
  <text x="600" y="795" text-anchor="middle" font-size="10" fill="#cbd5e1">cmd/mongoflux · internal/routing · internal/schema · internal/translator · internal/sync · internal/clickhouse</text>
</svg>